name: Bug 报告
description: 报告一个问题
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！请尽量附上**诊断包**——它包含日志、版本、配置快照（已脱敏），能极大加快定位。
        生成方式：设置 → 导出诊断包（功能开发中，暂可手动附上日志目录内容：帮助 → 打开日志目录）。
  - type: textarea
    id: what-happened
    attributes:
      label: 问题描述
      description: 发生了什么？你期望发生什么？
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 …
        2. 点击 …
        3. 看到 …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本
      placeholder: 例如 v0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: 诊断包 / 日志
      description: 请把诊断包 zip 或相关日志拖拽到此处。API key 等敏感信息已自动脱敏，但仍请自行确认。
    validations:
      required: false
