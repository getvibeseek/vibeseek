name: 功能建议
description: 提出一个新功能或改进
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 这个建议针对什么痛点？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 设想的方案
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 其他考虑过的方案
    validations:
      required: false
